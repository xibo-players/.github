name: Build ISO (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
        description: 'Package name for the kiosk image (e.g. xiboplayer-kiosk)'
      kickstart-file:
        type: string
        default: 'kickstart/xibo-kiosk.ks'
        description: 'Path to Kickstart file'
      mkosi-config:
        type: string
        default: 'mkosi.conf'
        description: 'Path to mkosi configuration file'
      build-disk-images:
        type: boolean
        default: true
        description: 'Build disk images (QCOW2 and raw) using mkosi'
      build-self-contained-iso:
        type: boolean
        default: false
        description: 'Build self-contained ISO with all packages (no network needed)'
      build-netinstall:
        type: boolean
        default: false
        description: 'Build lightweight netinstall ISO (needs network during install)'
      architectures:
        type: string
        default: 'x86_64'
        description: 'Comma-separated list of architectures (x86_64, aarch64)'
      default-version:
        type: string
        default: '0.2.0'
      # ── Customization + test-iteration inputs ──────────────────────────
      # All default to empty/false so existing callers keep working
      # byte-for-byte. Set from test-image workflows to override grub menu
      # text, inject debug kernel args, skip the "wait for repo" gate, or
      # upload the result as a GH Actions artifact instead of R2.
      iso-volid:
        type: string
        default: ''
        description: 'Override the output ISO volume ID (mkksiso -V). When set, remember to also rewrite the grub.cfg label references via iso-grub-replacements.'
      iso-cmdline-append:
        type: string
        default: ''
        description: 'Append to the installer kernel cmdline in grub.cfg (mkksiso -c). Space-separated list of args.'
      iso-cmdline-remove:
        type: string
        default: ''
        description: 'Remove args from the installer kernel cmdline in grub.cfg (mkksiso -r). Space-separated list, e.g. "quiet rhgb splash".'
      iso-grub-replacements:
        type: string
        default: ''
        description: 'Multiline text replacements applied to grub.cfg (mkksiso -R). One pair per line, pipe-separated: FROM|TO. Example: "Fedora 43|xiboplayer kiosk" renames every entry. Ignored if iso-grub-file is set (full replacement takes precedence over string substitution).'
      iso-grub-file:
        type: string
        default: ''
        description: 'Path to a custom grub.cfg file (relative to repo root) that REPLACES Fedora''s default grub.cfg in the ISO. Staged into an overlay dir and injected via mkksiso --add at BOTH /EFI/BOOT/grub.cfg (UEFI) and /boot/grub2/grub.cfg (BIOS) so every boot path lands on the same menu. Takes precedence over iso-grub-replacements. The custom grub.cfg MUST include its own `inst.ks=hd:LABEL=<volid>:/<basename>.ks` entries on every linux line — mkksiso''s automatic inst.ks= injection only applies to the edited Fedora grub.cfg, not to our overlay.'
      skip-preflight:
        type: boolean
        default: false
        description: 'Skip the "wait for package version to appear in the repo" preflight check. Use for test builds that do not need fresh RPMs.'
      upload-as-artifact:
        type: boolean
        default: false
        description: 'Upload built images as GH Actions artifacts (retention 14 days) instead of to R2 / creating a release. Use for test builds.'

jobs:
  # ── Pre-flight: wait for current package version to appear in the repo
  # then verify all required packages are present. The RPM/DEB build
  # workflows run in parallel — this step polls until our version lands.
  preflight:
    name: Verify packages
    if: inputs.skip-preflight != true
    runs-on: ubuntu-latest
    needs: [detect-version]
    steps:
      - name: Wait for ${{ inputs.package-name }} ${{ needs.detect-version.outputs.version }} in repo
        run: |
          PACKAGE="${{ inputs.package-name }}"
          EXPECTED="${{ needs.detect-version.outputs.version }}"
          PLAYERS="xiboplayer-electron xiboplayer-chromium"
          OTHER="arexibo xiboplayer-release xiboplayer-kiosk"

          # Wait up to 20 min for the repo to update (RPM + update-repos + propagation)
          for attempt in $(seq 1 80); do
            PKGS=$(curl -sf "https://dl.xiboplayer.org/rpm/packages.json" 2>/dev/null) || {
              echo "[$attempt] Cannot reach packages.json, retry in 15s..."
              sleep 15
              continue
            }

            CUR=$(echo "$PKGS" | python3 -c "
          import sys, json
          pkgs = json.load(sys.stdin)
          for p in pkgs:
              if p['name'] == '$PACKAGE':
                  print(p['version'].split('-')[0])
                  break
          ")

            if [ "$CUR" = "$EXPECTED" ]; then
              echo "[$attempt] $PACKAGE $EXPECTED is in the repo"
              break
            fi
            echo "[$attempt] $PACKAGE in repo: '$CUR', expected: '$EXPECTED' — retry in 15s"
            sleep 15
          done

          if [ "$CUR" != "$EXPECTED" ]; then
            echo "ERROR: $PACKAGE $EXPECTED did not appear in repo after 20 minutes"
            exit 1
          fi

          echo ""
          echo "=== Package versions in repo ==="
          echo "$PKGS" | python3 -c "
          import sys, json
          pkgs = json.load(sys.stdin)
          seen = {}
          for p in pkgs:
              if p['name'] not in seen:
                  seen[p['name']] = p['version']
                  print(f\"  {p['name']} {p['version']} ({p['arch']})\")

          players = '$PLAYERS'.split()
          other = '$OTHER'.split()
          all_required = players + other

          missing = [n for n in all_required if n not in seen]
          if missing:
              print(f\"\\nERROR: Missing packages: {', '.join(missing)}\")
              sys.exit(1)

          def base_version(v):
              return v.split('-')[0]

          player_versions = {n: base_version(seen[n]) for n in players}
          versions = set(player_versions.values())
          if len(versions) > 1:
              print(f\"\\nERROR: Player version mismatch:\")
              for n, v in player_versions.items():
                  print(f\"  {n}: {v}\")
              sys.exit(1)

          print(f\"\\nAll {len(all_required)} packages present, players at version {versions.pop()}\")
          "

  # ── Version detection (single source of truth) ───────────────────────
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Determine version (tag > RPM spec > package.json)
        id: version
        run: |
          # Strict — never fall back to a default. Fail loudly if no source.
          VERSION=""

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            # Strip release suffix if present (v0.4.19-2 → 0.4.19)
            VERSION="${VERSION%%-*}"
            echo "Read from git tag: $VERSION"
          else
            SPEC=$(find rpm -name '*.spec' -type f 2>/dev/null | head -1)
            if [ -n "$SPEC" ] && [ -f "$SPEC" ]; then
              SPEC_VER=$(grep -oP '^Version:\s*\K\S+' "$SPEC")
              if [ -n "$SPEC_VER" ] && [[ "$SPEC_VER" != *"%"* ]]; then
                VERSION="$SPEC_VER"
                echo "Read from RPM spec ($SPEC): $VERSION"
              fi
            fi

            if [ -z "$VERSION" ] && [ -f "package.json" ]; then
              VERSION=$(jq -r '.version' package.json 2>/dev/null)
              [ "$VERSION" = "null" ] && VERSION=""
              [ -n "$VERSION" ] && echo "Read from package.json: $VERSION"
            fi
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Cannot determine version. Need a git tag, an RPM spec with literal Version:, or a package.json."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ── Disk images (raw + QCOW2) via mkosi ──────────────────────────────
  build-disk-images:
    needs: [preflight, detect-version]
    # `always()` lets this job run even when the preflight was skipped
    # (which leaves its `needs:` result as `skipped` rather than `success`).
    if: |
      always()
      && inputs.build-disk-images == true
      && needs.detect-version.result == 'success'
      && (needs.preflight.result == 'success' || needs.preflight.result == 'skipped')
    name: Disk Images (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    container:
      image: fedora:43
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(contains(inputs.architectures, 'aarch64') && contains(inputs.architectures, 'x86_64') && '["x86_64","aarch64"]' || contains(inputs.architectures, 'aarch64') && '["aarch64"]' || '["x86_64"]') }}

    steps:
      - name: Free disk space
        run: |
          dnf clean all 2>/dev/null || true
          rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift 2>/dev/null || true
          df -h / | tail -1

      - name: Install dependencies
        run: |
          dnf install -y \
            git mkosi systemd-container qemu-img mtools xz awscli2

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure dnf for resilience
        run: |
          cat >> /etc/dnf/dnf.conf << 'EOF'
          retries=5
          timeout=120
          fastestmirror=True
          EOF

      - name: Use detected version
        id: version
        run: echo "version=${{ needs.detect-version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Prepare mkosi configuration
        run: |
          if [ -f "${{ inputs.mkosi-config }}" ]; then
            if [ "${{ inputs.mkosi-config }}" != "mkosi.conf" ]; then
              cp "${{ inputs.mkosi-config }}" mkosi.conf
            fi
          else
            cp scripts/mkosi/mkosi.conf.template mkosi.conf
            sed -i "s/ImageId=.*/ImageId=${{ inputs.package-name }}/" mkosi.conf
          fi

      - name: Set file permissions
        run: |
          find mkosi-extra -type f -name "*.sh" -exec chmod 755 {} \; 2>/dev/null || true
          find mkosi-extra -type f -name "doas.conf" -exec chmod 600 {} \; 2>/dev/null || true

      - name: Build disk image
        run: |
          # Retry wrapper: only retries on transient network errors (mirror
          # unreachable, DNS failure, curl timeout). Non-network errors
          # (package conflict, missing dependency, GPG check) fail immediately.
          retry_if_unreachable() {
            local max_attempts=3 backoff=30 attempt=1 logfile
            logfile=$(mktemp)
            while [ "$attempt" -le "$max_attempts" ]; do
              if "$@" 2>&1 | tee "$logfile"; then
                rm -f "$logfile"; return 0
              fi
              if grep -qiE 'curl error \(([67]|28)\)|could not connect|connection refused|timed out|all mirrors were tried|network is unreachable|name or service not known|failed to connect.*port' "$logfile"; then
                echo "::warning::Network error on attempt $attempt/$max_attempts, retrying in ${backoff}s..."
                sleep "$backoff"
                attempt=$((attempt + 1))
              else
                echo "::error::Non-network build error — not retrying"
                rm -f "$logfile"; return 1
              fi
            done
            echo "::error::Network error persisted after $max_attempts attempts"
            rm -f "$logfile"; return 1
          }

          retry_if_unreachable mkosi --force --image-version=${{ steps.version.outputs.version }}

      - name: Convert and compress
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cd output
          mv *.raw ${PACKAGE}_${VERSION}_${ARCH}.raw 2>/dev/null || true

          if [ -f ${PACKAGE}_${VERSION}_${ARCH}.raw ]; then
            qemu-img convert -f raw -O qcow2 -c \
              ${PACKAGE}_${VERSION}_${ARCH}.raw ${PACKAGE}_${VERSION}_${ARCH}.qcow2
            qemu-img resize ${PACKAGE}_${VERSION}_${ARCH}.qcow2 16G
            xz -T0 -9 ${PACKAGE}_${VERSION}_${ARCH}.raw
          fi

      - name: List output
        run: ls -lah output/

      - name: Upload to R2
        if: inputs.upload-as-artifact != true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
        run: |
          for file in output/*.qcow2 output/*.raw.xz; do
            [ -f "$file" ] || continue
            NAME=$(basename "$file")
            echo "Uploading $NAME"
            BUCKET="${R2_BUCKET}"
            aws s3 cp "$file" "${BUCKET}/${PACKAGE}/${VERSION}/${NAME}" \
              --endpoint-url "$R2_ENDPOINT"
          done

      - name: Upload as GH Actions artifact
        if: inputs.upload-as-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}-disk-${{ matrix.arch }}-${{ steps.version.outputs.version }}
          path: |
            output/${{ inputs.package-name }}_${{ steps.version.outputs.version }}_${{ matrix.arch }}.qcow2
            output/${{ inputs.package-name }}_${{ steps.version.outputs.version }}_${{ matrix.arch }}.raw.xz
          retention-days: 14
          if-no-files-found: error

  # ── Self-contained ISO (offline install) ─────────────────────────────
  build-self-contained-iso:
    needs: [preflight, detect-version]
    if: |
      always()
      && inputs.build-self-contained-iso == true
      && needs.detect-version.result == 'success'
      && (needs.preflight.result == 'success' || needs.preflight.result == 'skipped')
    name: Offline ISO (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    container:
      image: fedora:43
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(contains(inputs.architectures, 'aarch64') && contains(inputs.architectures, 'x86_64') && '["x86_64","aarch64"]' || contains(inputs.architectures, 'aarch64') && '["aarch64"]' || '["x86_64"]') }}

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            lorax pykickstart createrepo_c dnf-plugins-core curl xz awscli2 isomd5sum

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure dnf for resilience
        run: |
          cat >> /etc/dnf/dnf.conf << 'EOF'
          retries=5
          timeout=120
          fastestmirror=True
          EOF

      - name: Use detected version
        id: version
        run: echo "version=${{ needs.detect-version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Add custom repositories
        run: |
          cat > /etc/yum.repos.d/xiboplayer.repo << 'EOF'
          [xiboplayer]
          name=Xibo Players
          baseurl=https://dl.xiboplayer.org/rpm/fedora/$releasever/$basearch/
          enabled=1
          gpgcheck=0
          EOF

          # RPMFusion mirrors are occasionally unreachable — retry on
          # transient network errors only, fail fast on real dnf errors.
          retry_if_unreachable() {
            local max_attempts=3 backoff=30 attempt=1 logfile
            logfile=$(mktemp)
            while [ "$attempt" -le "$max_attempts" ]; do
              if "$@" 2>&1 | tee "$logfile"; then
                rm -f "$logfile"; return 0
              fi
              if grep -qiE 'curl error \(([67]|28)\)|could not connect|connection refused|timed out|all mirrors were tried|network is unreachable|name or service not known|failed to connect.*port' "$logfile"; then
                echo "::warning::Network error on attempt $attempt/$max_attempts, retrying in ${backoff}s..."
                sleep "$backoff"
                attempt=$((attempt + 1))
              else
                echo "::error::Non-network dnf error — not retrying"
                rm -f "$logfile"; return 1
              fi
            done
            echo "::error::Network error persisted after $max_attempts attempts"
            rm -f "$logfile"; return 1
          }

          retry_if_unreachable dnf install -y \
            https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-43.noarch.rpm \
            https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-43.noarch.rpm

      - name: Download all packages for offline install
        run: |
          mkdir -p /tmp/local-repo

          # Parse ALL packages from kickstart: %packages section + %post dnf commands
          KS_PACKAGES=$(sed -n '/%packages/,/%end/p' "${{ inputs.kickstart-file }}" | \
            grep -v '^%\|^#\|^-\|^@' | tr -s '\n' ' ')
          # Include @groups from %packages
          KS_GROUPS=$(sed -n '/%packages/,/%end/p' "${{ inputs.kickstart-file }}" | \
            grep '^@' | tr -s '\n' ' ')
          POST_PACKAGES=$(grep 'dnf install -y' "${{ inputs.kickstart-file }}" | \
            grep -v 'rpmfusion' | sed 's/.*dnf install -y //; s/--nogpgcheck //; s|https://[^ ]*||g' | tr -s '\n' ' ')

          # Also download xiboplayer-release so GPG key is available offline
          ALL_PACKAGES="$KS_PACKAGES $POST_PACKAGES xiboplayer-release"
          echo "Packages: $ALL_PACKAGES"
          echo "Groups: $KS_GROUPS"

          # Download all packages with full dependency resolution
          dnf download --resolve --alldeps --destdir=/tmp/local-repo \
            $ALL_PACKAGES $KS_GROUPS || true

          createrepo_c /tmp/local-repo
          PKG_COUNT=$(ls /tmp/local-repo/*.rpm 2>/dev/null | wc -l)
          REPO_SIZE=$(du -sh /tmp/local-repo | cut -f1)
          echo "Local repo: $PKG_COUNT packages, $REPO_SIZE"

      - name: Create offline kickstart
        run: |
          cp "${{ inputs.kickstart-file }}" /tmp/selfcontained.ks

          # Remove network install sources — all packages are local
          sed -i '/^url /d; /^repo /d' /tmp/selfcontained.ks

          # Tell Anaconda to use the installation media as base source
          sed -i '/^skipx/a cdrom' /tmp/selfcontained.ks

          # Add local repo embedded on the ISO for extra packages
          sed -i '/^cdrom/a repo --name=local-extras --baseurl=file:///run/install/repo/local-repo/' /tmp/selfcontained.ks

      - name: Download Fedora Everything netinst ISO
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          # Use netinst as base (~700 MB) instead of Workstation Live (~2.2 GB)
          # The netinst has Anaconda installer; our local repo provides all packages
          ISO_NAME="Fedora-Everything-netinst-${ARCH}-43-1.6.iso"

          # curl with retry — Fedora mirrors are generally reliable but
          # CDN edge nodes occasionally return transient errors.
          curl --retry 3 --retry-delay 15 --retry-connrefused \
            -L -o /tmp/fedora-netinst.iso \
            "https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/${ARCH}/iso/${ISO_NAME}"

      - name: Build self-contained offline ISO
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
          ARCH: ${{ matrix.arch }}
          ISO_VOLID: ${{ inputs.iso-volid }}
          ISO_CMDLINE_APPEND: ${{ inputs.iso-cmdline-append }}
          ISO_CMDLINE_REMOVE: ${{ inputs.iso-cmdline-remove }}
          ISO_GRUB_REPLACEMENTS: ${{ inputs.iso-grub-replacements }}
          ISO_GRUB_FILE: ${{ inputs.iso-grub-file }}
        run: |
          mkdir -p /tmp/iso-extra/local-repo
          cp -a /tmp/local-repo/* /tmp/iso-extra/local-repo/

          # Overlay the caller's grub.cfg at BOTH the UEFI and BIOS paths
          # via mkksiso --add. mkksiso's internal xorriso invocation
          # applies overlay files via `-map` AFTER its own `-update` of
          # the edited Fedora grub.cfg, so our file wins at both targets.
          # Previously we ran a SEPARATE xorriso pass after mkksiso to do
          # the same thing, but that second pass lost the
          # `-append_partition 2 efiboot.img` GPT-partition registration
          # mkksiso set up, breaking UEFI boot on some VM firmwares
          # (reported by 0x0, xibo-players/xiboplayer-kiosk#146). Using
          # --add keeps everything in one xorriso invocation — boot
          # metadata preserved end-to-end.
          if [ -n "$ISO_GRUB_FILE" ] && [ -f "$ISO_GRUB_FILE" ]; then
            mkdir -p /tmp/iso-extra/EFI/BOOT /tmp/iso-extra/boot/grub2
            cp "$ISO_GRUB_FILE" /tmp/iso-extra/EFI/BOOT/grub.cfg
            cp "$ISO_GRUB_FILE" /tmp/iso-extra/boot/grub2/grub.cfg
            echo "grub.cfg overlay staged at /tmp/iso-extra/EFI/BOOT/grub.cfg + /tmp/iso-extra/boot/grub2/grub.cfg"
          fi

          MKKSISO_ARGS=()
          [ -n "$ISO_VOLID" ] && MKKSISO_ARGS+=(-V "$ISO_VOLID")
          [ -n "$ISO_CMDLINE_APPEND" ] && MKKSISO_ARGS+=(-c "$ISO_CMDLINE_APPEND")
          [ -n "$ISO_CMDLINE_REMOVE" ] && MKKSISO_ARGS+=(-r "$ISO_CMDLINE_REMOVE")
          if [ -z "$ISO_GRUB_FILE" ] && [ -n "$ISO_GRUB_REPLACEMENTS" ]; then
            while IFS='|' read -r from to; do
              [ -z "$from" ] && continue
              MKKSISO_ARGS+=(-R "$from" "$to")
            done <<< "$ISO_GRUB_REPLACEMENTS"
          fi

          echo "mkksiso extra args: ${MKKSISO_ARGS[*]}"

          retry_if_unreachable() {
            local max_attempts=3 backoff=30 attempt=1 logfile
            logfile=$(mktemp)
            while [ "$attempt" -le "$max_attempts" ]; do
              if "$@" 2>&1 | tee "$logfile"; then
                rm -f "$logfile"; return 0
              fi
              if grep -qiE 'curl error \(([67]|28)\)|could not connect|connection refused|timed out|all mirrors were tried|network is unreachable|name or service not known|failed to connect.*port' "$logfile"; then
                echo "::warning::Network error on attempt $attempt/$max_attempts, retrying in ${backoff}s..."
                sleep "$backoff"
                attempt=$((attempt + 1))
              else
                echo "::error::Non-network build error — not retrying"
                rm -f "$logfile"; return 1
              fi
            done
            echo "::error::Network error persisted after $max_attempts attempts"
            rm -f "$logfile"; return 1
          }

          ISO_OUT="${PACKAGE}-everything_${VERSION}_${ARCH}.iso"

          retry_if_unreachable mkksiso "${MKKSISO_ARGS[@]}" \
            --ks /tmp/selfcontained.ks \
            --add /tmp/iso-extra \
            /tmp/fedora-netinst.iso \
            "$ISO_OUT"

          # Post-patch grub.cfg — our --add overlay is OVERWRITTEN by
          # mkksiso's internal EditGrub2/RebuildEFIBoot step, so we must
          # re-apply afterwards. `-boot_image any replay` inherits every
          # El Torito catalog entry, MBR/GPT table and appended partition
          # (incl. efiboot.img) from the input ISO. Only the two grub.cfg
          # files are substituted. This avoids the #146 regression our
          # previous plain `xorriso -map` pass caused by dropping the
          # `-append_partition 2 efiboot.img` metadata.
          if [ -n "$ISO_GRUB_FILE" ] && [ -f "$ISO_GRUB_FILE" ]; then
            mv "$ISO_OUT" "${ISO_OUT}.pre-grub"
            xorriso \
              -indev "${ISO_OUT}.pre-grub" \
              -outdev "$ISO_OUT" \
              -boot_image any replay \
              -map "$ISO_GRUB_FILE" /EFI/BOOT/grub.cfg \
              -map "$ISO_GRUB_FILE" /boot/grub2/grub.cfg \
              --
            rm -f "${ISO_OUT}.pre-grub"
          fi

          implantisomd5 --force "$ISO_OUT"
          ls -lah "$ISO_OUT"

      - name: Upload to R2
        if: inputs.upload-as-artifact != true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
        run: |
          for file in *.iso; do
            [ -f "$file" ] || continue
            NAME=$(basename "$file")
            echo "Uploading $NAME"
            BUCKET="${R2_BUCKET}"
            aws s3 cp "$file" "${BUCKET}/${PACKAGE}/${VERSION}/${NAME}" \
              --endpoint-url "$R2_ENDPOINT"
          done

      - name: Upload as GH Actions artifact
        if: inputs.upload-as-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}-everything-${{ matrix.arch }}-${{ steps.version.outputs.version }}
          path: ${{ inputs.package-name }}-everything_${{ steps.version.outputs.version }}_${{ matrix.arch }}.iso
          retention-days: 14
          if-no-files-found: error

  # ── Netinstall ISO (lightweight, needs network) ──────────────────────
  build-netinstall:
    needs: [preflight, detect-version]
    if: |
      always()
      && inputs.build-netinstall == true
      && needs.detect-version.result == 'success'
      && (needs.preflight.result == 'success' || needs.preflight.result == 'skipped')
    name: Netinstall ISO (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    container:
      image: fedora:43
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(contains(inputs.architectures, 'aarch64') && contains(inputs.architectures, 'x86_64') && '["x86_64","aarch64"]' || contains(inputs.architectures, 'aarch64') && '["aarch64"]' || '["x86_64"]') }}

    steps:
      - name: Install dependencies
        run: dnf install -y lorax pykickstart curl awscli2 isomd5sum

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use detected version
        id: version
        run: echo "version=${{ needs.detect-version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Download Fedora Everything netinstall ISO
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          curl -L -o /tmp/fedora-netinst.iso \
            "https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/${ARCH}/iso/Fedora-Everything-netinst-${ARCH}-43-1.6.iso"

      - name: Validate kickstart
        run: |
          ksvalidator "${{ inputs.kickstart-file }}" || echo "Kickstart validation warnings (non-fatal)"

      - name: Build netinstall ISO
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
          ARCH: ${{ matrix.arch }}
          ISO_VOLID: ${{ inputs.iso-volid }}
          ISO_CMDLINE_APPEND: ${{ inputs.iso-cmdline-append }}
          ISO_CMDLINE_REMOVE: ${{ inputs.iso-cmdline-remove }}
          ISO_GRUB_REPLACEMENTS: ${{ inputs.iso-grub-replacements }}
          ISO_GRUB_FILE: ${{ inputs.iso-grub-file }}
        run: |
          # Build dynamic mkksiso arg array from customization inputs.
          # Each input is optional; empty values contribute no flag.
          MKKSISO_ARGS=()
          [ -n "$ISO_VOLID" ] && MKKSISO_ARGS+=(-V "$ISO_VOLID")
          [ -n "$ISO_CMDLINE_APPEND" ] && MKKSISO_ARGS+=(-c "$ISO_CMDLINE_APPEND")
          [ -n "$ISO_CMDLINE_REMOVE" ] && MKKSISO_ARGS+=(-r "$ISO_CMDLINE_REMOVE")

          # String replacements (fallback when no custom grub file)
          if [ -z "$ISO_GRUB_FILE" ] && [ -n "$ISO_GRUB_REPLACEMENTS" ]; then
            while IFS='|' read -r from to; do
              [ -z "$from" ] && continue
              MKKSISO_ARGS+=(-R "$from" "$to")
            done <<< "$ISO_GRUB_REPLACEMENTS"
          fi

          # Custom grub.cfg — overlay via mkksiso --add at BOTH the UEFI
          # (/EFI/BOOT) and BIOS (/boot/grub2) paths so either boot mode
          # lands on the caller's menu. mkksiso's internal xorriso `-map`
          # step runs AFTER its `-update` of the edited Fedora grub.cfg,
          # so our overlay file wins. Previously we ran a second xorriso
          # pass after mkksiso to do the same thing, but that pass lost
          # the `-append_partition 2 efiboot.img` GPT-partition
          # registration mkksiso set up, breaking UEFI boot on some VM
          # firmwares (xibo-players/xiboplayer-kiosk#146).
          if [ -n "$ISO_GRUB_FILE" ] && [ -f "$ISO_GRUB_FILE" ]; then
            mkdir -p /tmp/grub-overlay/EFI/BOOT /tmp/grub-overlay/boot/grub2
            cp "$ISO_GRUB_FILE" /tmp/grub-overlay/EFI/BOOT/grub.cfg
            cp "$ISO_GRUB_FILE" /tmp/grub-overlay/boot/grub2/grub.cfg
            MKKSISO_ARGS+=(--add /tmp/grub-overlay)
            echo "grub.cfg overlay staged at /tmp/grub-overlay/EFI/BOOT/grub.cfg + /tmp/grub-overlay/boot/grub2/grub.cfg"
          fi

          echo "mkksiso extra args: ${MKKSISO_ARGS[*]}"

          retry_if_unreachable() {
            local max_attempts=3 backoff=30 attempt=1 logfile
            logfile=$(mktemp)
            while [ "$attempt" -le "$max_attempts" ]; do
              if "$@" 2>&1 | tee "$logfile"; then
                rm -f "$logfile"; return 0
              fi
              if grep -qiE 'curl error \(([67]|28)\)|could not connect|connection refused|timed out|all mirrors were tried|network is unreachable|name or service not known|failed to connect.*port' "$logfile"; then
                echo "::warning::Network error on attempt $attempt/$max_attempts, retrying in ${backoff}s..."
                sleep "$backoff"
                attempt=$((attempt + 1))
              else
                echo "::error::Non-network build error — not retrying"
                rm -f "$logfile"; return 1
              fi
            done
            echo "::error::Network error persisted after $max_attempts attempts"
            rm -f "$logfile"; return 1
          }

          ISO_OUT="${PACKAGE}-netinstall_${VERSION}_${ARCH}.iso"

          retry_if_unreachable mkksiso "${MKKSISO_ARGS[@]}" \
            --ks "${{ inputs.kickstart-file }}" \
            /tmp/fedora-netinst.iso \
            "$ISO_OUT"

          # Post-patch grub.cfg — our --add overlay is OVERWRITTEN by
          # mkksiso's internal EditGrub2/RebuildEFIBoot step, so we must
          # re-apply afterwards. `-boot_image any replay` inherits every
          # El Torito catalog entry, MBR/GPT table and appended partition
          # (incl. efiboot.img) from the input ISO. Only the two grub.cfg
          # files are substituted. This avoids the #146 regression our
          # previous plain `xorriso -map` pass caused by dropping the
          # `-append_partition 2 efiboot.img` metadata.
          if [ -n "$ISO_GRUB_FILE" ] && [ -f "$ISO_GRUB_FILE" ]; then
            mv "$ISO_OUT" "${ISO_OUT}.pre-grub"
            xorriso \
              -indev "${ISO_OUT}.pre-grub" \
              -outdev "$ISO_OUT" \
              -boot_image any replay \
              -map "$ISO_GRUB_FILE" /EFI/BOOT/grub.cfg \
              -map "$ISO_GRUB_FILE" /boot/grub2/grub.cfg \
              --
            rm -f "${ISO_OUT}.pre-grub"
          fi

          # Embed checksum so "Verify media" (rd.live.check) works
          # on the modified ISO. --force overwrites Fedora's stale checksum.
          # Runs AFTER the xorriso post-patch so the stored checksum
          # reflects the final file layout (with our grub.cfg).
          implantisomd5 --force "$ISO_OUT"

          ls -lah "$ISO_OUT"

      - name: Upload to R2
        if: inputs.upload-as-artifact != true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
        run: |
          for file in *.iso; do
            [ -f "$file" ] || continue
            NAME=$(basename "$file")
            echo "Uploading $NAME"
            BUCKET="${R2_BUCKET}"
            aws s3 cp "$file" "${BUCKET}/${PACKAGE}/${VERSION}/${NAME}" \
              --endpoint-url "$R2_ENDPOINT"
          done

      - name: Upload as GH Actions artifact
        if: inputs.upload-as-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}-netinstall-${{ matrix.arch }}-${{ steps.version.outputs.version }}
          path: ${{ inputs.package-name }}-netinstall_${{ steps.version.outputs.version }}_${{ matrix.arch }}.iso
          retention-days: 14
          if-no-files-found: error

      # Test builds ALSO upload to an R2 test prefix for fast download.
      # The GH Actions artifact download API is throttled hard (~1 MB/s),
      # which makes a 1.1 GB ISO take 15-20 minutes to fetch. The same
      # file on R2 behind Cloudflare's CDN downloads at 50-200 MB/s.
      # Path: <bucket>/<package>/test/<short-sha>/<iso-name>
      # URL:  https://images.xiboplayer.org/<package>/test/<short-sha>/<iso-name>
      - name: Upload to R2 test prefix (fast download alternative)
        if: inputs.upload-as-artifact == true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          BUCKET="${R2_BUCKET}"
          for file in *.iso; do
            [ -f "$file" ] || continue
            NAME=$(basename "$file")
            DEST="${BUCKET}/${PACKAGE}/test/${SHORT_SHA}/${NAME}"
            echo "Uploading $NAME → $DEST"
            aws s3 cp "$file" "$DEST" --endpoint-url "$R2_ENDPOINT"
            # Print a clickable CDN URL into the job annotations so the
            # operator can grab it directly from the GH Actions run page.
            URL="https://images.xiboplayer.org/${PACKAGE}/test/${SHORT_SHA}/${NAME}"
            echo "::notice title=Test ISO ready::$URL"
            echo "$URL"
          done

  # ── GitHub Release with download links ───────────────────────────────
  release:
    name: Create GitHub Release
    needs: [detect-version, build-disk-images, build-self-contained-iso, build-netinstall]
    # Skip release creation when artifacts are being uploaded to GH Actions
    # (test builds). Release body assumes files are on R2 — which they aren't.
    if: |
      always()
      && inputs.upload-as-artifact != true
      && (needs.build-disk-images.result == 'success' || needs.build-self-contained-iso.result == 'success' || needs.build-netinstall.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use detected version
        id: version
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PACKAGE: ${{ inputs.package-name }}
          VERSION: ${{ steps.version.outputs.version }}
          DL: https://images.xiboplayer.org
        run: |
          NOTES=$(cat <<NOTES_EOF
          # ${PACKAGE} ${TAG}

          Turn any PC or Raspberry Pi into a digital signage kiosk.

          ## Download images

          | Image | Hardware | Download |
          |-------|----------|----------|
          | **Offline ISO (x86_64)** | Any PC or laptop | [${PACKAGE}-everything_${VERSION}_x86_64.iso](${DL}/${PACKAGE}/${VERSION}/${PACKAGE}-everything_${VERSION}_x86_64.iso) |
          | **Offline ISO (aarch64)** | ARM mini PCs | [${PACKAGE}-everything_${VERSION}_aarch64.iso](${DL}/${PACKAGE}/${VERSION}/${PACKAGE}-everything_${VERSION}_aarch64.iso) |
          | **Netinstall ISO** | PC (needs network) | [${PACKAGE}-netinstall_${VERSION}_x86_64.iso](${DL}/${PACKAGE}/${VERSION}/${PACKAGE}-netinstall_${VERSION}_x86_64.iso) |
          | **Raw disk (aarch64)** | Raspberry Pi 4/5 | [${PACKAGE}_${VERSION}_aarch64.raw.xz](${DL}/${PACKAGE}/${VERSION}/${PACKAGE}_${VERSION}_aarch64.raw.xz) |
          | **Raw disk (x86_64)** | Intel NUC, embedded | [${PACKAGE}_${VERSION}_x86_64.raw.xz](${DL}/${PACKAGE}/${VERSION}/${PACKAGE}_${VERSION}_x86_64.raw.xz) |
          | **QCOW2 (x86_64)** | Virtual machines | [${PACKAGE}_${VERSION}_x86_64.qcow2](${DL}/${PACKAGE}/${VERSION}/${PACKAGE}_${VERSION}_x86_64.qcow2) |
          | **QCOW2 (aarch64)** | RPi VM testing | [${PACKAGE}_${VERSION}_aarch64.qcow2](${DL}/${PACKAGE}/${VERSION}/${PACKAGE}_${VERSION}_aarch64.qcow2) |

          ## After booting

          See the [first-boot guide](https://www.xiboplayer.org/guide/first-boot) for setup instructions.
          NOTES_EOF
          )

          gh release view "$TAG" --json tagName >/dev/null 2>&1 || \
            gh release create "$TAG" --title "${PACKAGE} ${TAG}" --notes ""
          gh release edit "$TAG" --notes "$NOTES"

      - name: Generate SHA256SUMS, GPG-sign, and write LATEST on R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          RPM_GPG_KEY: ${{ secrets.RPM_GPG_KEY }}
          RPM_GPG_KEY_ID: ${{ secrets.RPM_GPG_KEY_ID }}
          RPM_GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}
          PACKAGE: ${{ inputs.package-name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pip install awscli 2>/dev/null || true
          dnf install -y gnupg2 pinentry 2>/dev/null || true
          BUCKET="${R2_BUCKET}"
          PREFIX="${PACKAGE}/${VERSION}"

          # Download all image files for this version (NOT SHA256SUMS
          # itself — the old code checksummed its own empty file,
          # producing the sha256-of-empty-string e3b0c44... as the
          # first entry, which is wrong).
          mkdir -p /tmp/checksums
          aws s3 ls "$BUCKET/$PREFIX/" --endpoint-url "$R2_ENDPOINT" | awk '{print $4}' | \
          while read -r name; do
            [ -n "$name" ] || continue
            # Skip SHA256SUMS and any .asc/.gpg files from previous runs
            case "$name" in SHA256SUMS*|*.asc|*.gpg) continue ;; esac
            aws s3 cp "$BUCKET/$PREFIX/$name" "/tmp/checksums/$name" --endpoint-url "$R2_ENDPOINT"
          done

          # Generate SHA256SUMS — only image files, no self-reference
          (cd /tmp/checksums && sha256sum * > SHA256SUMS)
          echo "=== SHA256SUMS ==="
          cat /tmp/checksums/SHA256SUMS

          # GPG-sign SHA256SUMS so operators can verify provenance.
          # Uses the SAME key + passphrase mechanism as build-rpm.yml:
          #   - RPM_GPG_KEY is base64-encoded (must decode before import)
          #   - RPM_GPG_PASSPHRASE may be empty (key with no passphrase)
          #     or set at org/repo level
          #   - Custom pinentry-ci serves the passphrase non-interactively
          #     (GPG in CI has no /dev/tty for interactive pinentry)
          #
          # If key/passphrase aren't available (test builds, forks),
          # signing is skipped gracefully — checksums still upload.
          if [ -n "$RPM_GPG_KEY" ]; then
            echo "$RPM_GPG_KEY" | base64 -d | gpg --batch --import 2>&1 || true

            # Create the same pinentry-ci that build-rpm.yml uses
            printf '%s' "$RPM_GPG_PASSPHRASE" > /tmp/.gpg-passphrase
            chmod 600 /tmp/.gpg-passphrase
            cat > /usr/local/bin/pinentry-ci << 'PINENTRY'
            #!/bin/bash
            echo "OK Pleased to meet you"
            while IFS= read -r cmd; do
              case "${cmd%% *}" in
                GETPIN) echo "D $(cat /tmp/.gpg-passphrase)"; echo "OK" ;;
                BYE)    echo "OK closing connection"; exit 0 ;;
                *)      echo "OK" ;;
              esac
            done
          PINENTRY
            chmod +x /usr/local/bin/pinentry-ci
            gpgconf --kill gpg-agent 2>/dev/null || true
            GPG_AGENT_CONF="$(gpgconf --list-dirs homedir)/gpg-agent.conf"
            mkdir -p "$(dirname "$GPG_AGENT_CONF")"
            echo "pinentry-program /usr/local/bin/pinentry-ci" > "$GPG_AGENT_CONF"

            if gpg --batch --yes --detach-sign --armor \
                ${RPM_GPG_KEY_ID:+--default-key "$RPM_GPG_KEY_ID"} \
                /tmp/checksums/SHA256SUMS 2>&1; then
              echo "GPG signature: SHA256SUMS.asc created"
            else
              echo "::warning::GPG signing failed — SHA256SUMS uploaded unsigned"
            fi
            rm -f /tmp/.gpg-passphrase
          else
            echo "::warning::RPM_GPG_KEY not set — SHA256SUMS NOT GPG-signed"
          fi

          # Upload SHA256SUMS + signature
          aws s3 cp /tmp/checksums/SHA256SUMS "$BUCKET/$PREFIX/SHA256SUMS" \
            --endpoint-url "$R2_ENDPOINT"
          if [ -f /tmp/checksums/SHA256SUMS.asc ]; then
            aws s3 cp /tmp/checksums/SHA256SUMS.asc "$BUCKET/$PREFIX/SHA256SUMS.asc" \
              --endpoint-url "$R2_ENDPOINT"
          fi

          # Write LATEST version file
          echo "$VERSION" > /tmp/LATEST
          aws s3 cp /tmp/LATEST "$BUCKET/$PACKAGE/LATEST" \
            --endpoint-url "$R2_ENDPOINT"

      - name: Upload assets to GitHub Release (files under 2 GB)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          MAX_SIZE=$((2 * 1024 * 1024 * 1024 - 1))  # 2 GB - 1 byte
          for file in /tmp/checksums/*; do
            [ -f "$file" ] || continue
            SIZE=$(stat -c%s "$file")
            NAME=$(basename "$file")
            if [ "$SIZE" -le "$MAX_SIZE" ]; then
              echo "Uploading $NAME ($((SIZE / 1048576)) MB) to GH Release"
              gh release upload "$TAG" "$file" --clobber || true
            else
              echo "Skipping $NAME ($((SIZE / 1048576)) MB) — exceeds 2 GB GH limit"
            fi
          done
