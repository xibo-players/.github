name: Build ISO (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
        description: 'Package name for the kiosk image (e.g. xiboplayer-electron)'
      kickstart-file:
        type: string
        default: 'kickstart/xibo-kiosk.ks'
        description: 'Path to Kickstart file for installer ISO'
      mkosi-config:
        type: string
        default: 'mkosi.conf'
        description: 'Path to mkosi configuration file'
      build-installer:
        type: boolean
        default: true
        description: 'Build installer ISO using kickstart'
      build-disk-images:
        type: boolean
        default: true
        description: 'Build disk images (QCOW2 and raw) using mkosi'
      architectures:
        type: string
        default: 'x86_64'
        description: 'Comma-separated list of architectures (x86_64, aarch64)'
      build-self-contained-iso:
        type: boolean
        default: false
        description: 'Build self-contained ISO with all packages included (no network needed)'
      blueprint-file:
        type: string
        default: 'osbuild/xiboplayer-kiosk.toml'
        description: 'Path to osbuild-composer blueprint TOML for self-contained ISO'
      default-version:
        type: string
        default: '0.2.0'
      release-body:
        type: string
        default: ''
        description: 'Custom release body markdown. Empty = auto-generated.'

jobs:
  build-disk-images-x86_64:
    if: inputs.build-disk-images == true && contains(inputs.architectures, 'x86_64')
    name: Build Disk Images (x86_64)
    runs-on: ubuntu-latest
    container:
      image: fedora:43
      options: --privileged

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git \
            mkosi \
            systemd-container \
            qemu-img \
            mtools \
            xz

      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version || inputs.default-version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.default-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare mkosi configuration
        run: |
          if [ -f "${{ inputs.mkosi-config }}" ]; then
            echo "Using provided mkosi configuration"
            if [ "${{ inputs.mkosi-config }}" != "mkosi.conf" ]; then
              cp "${{ inputs.mkosi-config }}" mkosi.conf
            fi
          else
            echo "Using template mkosi configuration"
            cp scripts/mkosi/mkosi.conf.template mkosi.conf
            # Customize ImageId
            sed -i "s/ImageId=.*/ImageId=${{ inputs.package-name }}/" mkosi.conf
          fi

      - name: Set file permissions
        run: |
          # Set permissions for any scripts in mkosi-extra
          find mkosi-extra -type f -name "*.sh" -exec chmod 755 {} \; 2>/dev/null || true
          find mkosi-extra -type f -name "doas.conf" -exec chmod 600 {} \; 2>/dev/null || true

      - name: Build disk image with mkosi
        run: |
          # Retry once on transient mirror/checksum failures
          mkosi --force --image-version=${{ steps.version.outputs.version }} || \
            (echo "Retrying after transient failure..." && sleep 10 && \
             mkosi --force --image-version=${{ steps.version.outputs.version }})

      - name: Convert and compress images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
        run: |
          cd output
          # Rename raw image
          mv *.raw ${PACKAGE}_${VERSION}_x86_64.raw 2>/dev/null || true
          
          # Create QCOW2 for VMs
          if [ -f ${PACKAGE}_${VERSION}_x86_64.raw ]; then
            qemu-img convert -f raw -O qcow2 -c ${PACKAGE}_${VERSION}_x86_64.raw ${PACKAGE}_${VERSION}_x86_64.qcow2
            qemu-img resize ${PACKAGE}_${VERSION}_x86_64.qcow2 16G
            
            # Compress raw image
            xz -T0 -9 ${PACKAGE}_${VERSION}_x86_64.raw
          fi

      - name: List output
        run: ls -lah output/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}-images-x86_64
          path: |
            output/*.qcow2
            output/*.raw.xz
          retention-days: 30

  build-disk-images-aarch64:
    if: inputs.build-disk-images == true && contains(inputs.architectures, 'aarch64')
    name: Build Disk Images (aarch64)
    runs-on: ubuntu-24.04-arm
    container:
      image: fedora:43
      options: --privileged

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git \
            mkosi \
            systemd-container \
            mtools \
            xz

      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version || inputs.default-version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.default-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare mkosi configuration
        run: |
          if [ -f "${{ inputs.mkosi-config }}" ]; then
            echo "Using provided mkosi configuration"
            if [ "${{ inputs.mkosi-config }}" != "mkosi.conf" ]; then
              cp "${{ inputs.mkosi-config }}" mkosi.conf
            fi
          else
            echo "Using template mkosi configuration"
            cp scripts/mkosi/mkosi.conf.template mkosi.conf
            sed -i "s/ImageId=.*/ImageId=${{ inputs.package-name }}/" mkosi.conf
          fi

      - name: Set file permissions
        run: |
          find mkosi-extra -type f -name "*.sh" -exec chmod 755 {} \; 2>/dev/null || true
          find mkosi-extra -type f -name "doas.conf" -exec chmod 600 {} \; 2>/dev/null || true

      - name: Build disk image
        run: |
          mkosi --force --image-version=${{ steps.version.outputs.version }} || \
            (echo "Retrying after transient failure..." && sleep 10 && \
             mkosi --force --image-version=${{ steps.version.outputs.version }})

      - name: Rename and compress
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
        run: |
          cd output
          mv *.raw ${PACKAGE}_${VERSION}_aarch64.raw 2>/dev/null || true
          if [ -f ${PACKAGE}_${VERSION}_aarch64.raw ]; then
            xz -T0 -9 ${PACKAGE}_${VERSION}_aarch64.raw
          fi

      - name: List output
        run: ls -lah output/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}-images-aarch64
          path: output/*.raw.xz
          retention-days: 30


  build-self-contained-iso:
    if: inputs.build-self-contained-iso == true
    name: Build Self-Contained ISO
    runs-on: ubuntu-latest
    container:
      image: fedora:43
      options: --privileged

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            lorax pykickstart createrepo_c \
            dnf-plugins-core curl xz

      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version || inputs.default-version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.default-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Add custom repositories
        run: |
          # Add xiboplayer repo
          cat > /etc/yum.repos.d/xiboplayer.repo << 'EOF'
          [xiboplayer]
          name=Xibo Players
          baseurl=https://dl.xiboplayer.org/rpm/fedora/$releasever/$basearch/
          enabled=1
          gpgcheck=0
          EOF

          # Add RPM Fusion
          dnf install -y \
            https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-43.noarch.rpm \
            https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-43.noarch.rpm

      - name: Download extra packages not on Workstation ISO
        run: |
          mkdir -p /tmp/local-repo

          # Workstation Live already has: GNOME, Wayland, GDM, NetworkManager,
          # kernel, grub, firefox, fonts, hardware-support, etc.
          # We only need our extras + media packages not on Workstation.

          # Parse packages from kickstart %packages section
          KS_PACKAGES=$(sed -n '/%packages/,/%end/p' "${{ inputs.kickstart-file }}" | \
            grep -v '^%\|^#\|^-\|^@' | tr -s '\n' ' ')

          # Post-install packages (from %post dnf install commands)
          POST_PACKAGES=$(grep 'dnf install -y' "${{ inputs.kickstart-file }}" | \
            grep -v 'rpmfusion\|release' | sed 's/.*dnf install -y //' | tr -s '\n' ' ')

          ALL_PACKAGES="$KS_PACKAGES $POST_PACKAGES"
          echo "Downloading extra packages: $ALL_PACKAGES"

          # Download with all dependencies
          dnf download --resolve --alldeps --destdir=/tmp/local-repo \
            $ALL_PACKAGES || true

          # Create repo metadata
          createrepo_c /tmp/local-repo
          PKG_COUNT=$(ls /tmp/local-repo/*.rpm 2>/dev/null | wc -l)
          REPO_SIZE=$(du -sh /tmp/local-repo | cut -f1)
          echo "Local repo: $PKG_COUNT packages, $REPO_SIZE"

      - name: Create offline kickstart
        run: |
          cp "${{ inputs.kickstart-file }}" /tmp/selfcontained.ks

          # Remove network install source
          sed -i '/^url /d; /^repo /d' /tmp/selfcontained.ks

          # Add local repo for extra packages embedded on the ISO
          sed -i '/^skipx/a repo --name=local-extras --baseurl=file:///run/install/repo/local-repo/' /tmp/selfcontained.ks

          echo "=== Offline kickstart ==="
          head -30 /tmp/selfcontained.ks

      - name: Download Fedora Workstation Live ISO
        run: |
          curl -L -o /tmp/fedora-workstation.iso \
            "https://ftp.plusline.net/fedora/linux/releases/43/Workstation/x86_64/iso/Fedora-Workstation-Live-43-1.6.x86_64.iso"

      - name: Build self-contained ISO
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
        run: |
          # Embed kickstart + extra package repo into Workstation ISO
          mkdir -p /tmp/iso-extra/local-repo
          cp -a /tmp/local-repo/* /tmp/iso-extra/local-repo/

          mkksiso --skip-mkefiboot \
            --ks /tmp/selfcontained.ks \
            --add /tmp/iso-extra \
            /tmp/fedora-workstation.iso \
            ${PACKAGE}-installer_${VERSION}_x86_64.iso || \
          (echo "Retrying..." && sleep 10 && \
           mkksiso --skip-mkefiboot \
            --ks /tmp/selfcontained.ks \
            --add /tmp/iso-extra \
            /tmp/fedora-workstation.iso \
            ${PACKAGE}-installer_${VERSION}_x86_64.iso)

          ls -lah ${PACKAGE}-installer_${VERSION}_x86_64.iso

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}-self-contained-iso
          path: "*.iso"
          retention-days: 30

  publish:
    name: Publish to GHCR
    needs: [build-disk-images-x86_64, build-disk-images-aarch64, build-self-contained-iso]
    if: always() && (needs.build-disk-images-x86_64.result == 'success' || needs.build-disk-images-aarch64.result == 'success' || needs.build-self-contained-iso.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install ORAS
        run: |
          curl -LO https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz
          tar xzf oras_1.2.2_linux_amd64.tar.gz -C /usr/local/bin oras

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ inputs.default-version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.default-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.iso" -o -name "*.qcow2" -o -name "*.raw.xz" \) -exec mv {} release/ \;
          ls -lah release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Push images to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package-name }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          cd release
          for file in *.iso *.qcow2 *.raw.xz; do
            [ -f "$file" ] || continue
            # Derive image type from filename (iso, qcow2, raw-x86_64, raw-aarch64)
            case "$file" in
              *installer*.iso)   TYPE="iso" ;;
              *.qcow2)           TYPE="qcow2" ;;
              *aarch64.raw.xz)   TYPE="raw-aarch64" ;;
              *x86_64.raw.xz)    TYPE="raw-x86_64" ;;
              *)                 TYPE="image" ;;
            esac
            REPO="${REGISTRY}/${PACKAGE}/${TYPE}"
            echo "Pushing $file → ${REPO}:${VERSION}"
            oras push "${REPO}:${VERSION}" \
              --annotation "org.opencontainers.image.title=${file}" \
              --annotation "org.opencontainers.image.version=${VERSION}" \
              "$file"
            # Also tag as latest
            oras tag "${REPO}:${VERSION}" latest
          done

          # Push checksums
          oras push "${REGISTRY}/${PACKAGE}/checksums:${VERSION}" SHA256SUMS
          oras tag "${REGISTRY}/${PACKAGE}/checksums:${VERSION}" latest

      - name: Create GitHub Release (metadata only, images on GHCR)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PACKAGE: ${{ inputs.package-name }}
          VERSION: ${{ steps.version.outputs.version }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          NOTES=$(cat <<NOTES_EOF
          # ${PACKAGE} ${TAG}

          Turn any PC or Raspberry Pi into a digital signage kiosk — just flash, boot, and connect to your Xibo CMS.

          ## Download images

          All images are hosted on GHCR. Install [ORAS](https://oras.land) to download:

          \`\`\`bash
          # Installer ISO (PC/laptop — fully offline, includes all packages)
          oras pull ${REGISTRY}/${PACKAGE}/iso:${VERSION}

          # Raspberry Pi raw image
          oras pull ${REGISTRY}/${PACKAGE}/raw-aarch64:${VERSION}

          # Intel NUC / embedded raw image
          oras pull ${REGISTRY}/${PACKAGE}/raw-x86_64:${VERSION}

          # Virtual machine (QCOW2)
          oras pull ${REGISTRY}/${PACKAGE}/qcow2:${VERSION}

          # Checksums
          oras pull ${REGISTRY}/${PACKAGE}/checksums:${VERSION}
          \`\`\`

          ## Quick start

          ### 🖥️ PC or laptop — Installer ISO
          1. \`oras pull ${REGISTRY}/${PACKAGE}/iso:${VERSION}\`
          2. Flash to USB: \`sudo dd if=*.iso of=/dev/sdX bs=8M status=progress\` or use [Balena Etcher](https://etcher.balena.io/)
          3. Boot from USB — fully automated install, no network needed
          4. Remove USB, reboot

          ### 🍓 Raspberry Pi 4/5 — Raw image
          1. \`oras pull ${REGISTRY}/${PACKAGE}/raw-aarch64:${VERSION}\`
          2. \`xz -dc *.raw.xz | sudo dd of=/dev/sdX bs=8M status=progress\` or use Balena Etcher
          3. Insert SD card, power on

          ### 💻 Virtual machine — QCOW2
          1. \`oras pull ${REGISTRY}/${PACKAGE}/qcow2:${VERSION}\`
          2. Open with GNOME Boxes, virt-manager, Proxmox or QEMU

          ## After booting

          1. Log in: \`xibo\` / \`xibo\`
          2. Change password: \`passwd\`
          3. Connect to your Xibo CMS from the setup screen
          4. Content plays automatically

          ## Container registry

          Images: \`${REGISTRY}/${PACKAGE}/\`
          NOTES_EOF
          )

          gh release view "$TAG" --json tagName >/dev/null 2>&1 || \
            gh release create "$TAG" --title "${PACKAGE} ${TAG}" --notes ""
          gh release edit "$TAG" --notes "$NOTES"

          # Upload only checksums to GitHub Release (small file)
          gh release upload "$TAG" release/SHA256SUMS --clobber
