name: Test (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '22'
      test-command:
        type: string
        default: 'pnpm test'
      lint-command:
        type: string
        default: ''
      typecheck:
        type: boolean
        default: false
      audit:
        type: boolean
        default: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        if: inputs.lint-command != ''
        run: ${{ inputs.lint-command }}

      - name: Type check
        if: inputs.typecheck
        run: pnpm --filter @xiboplayer/pwa exec tsc --noEmit

      - name: Test
        run: ${{ inputs.test-command }}

      - name: Security audit
        if: inputs.audit
        run: pnpm audit --audit-level=high || true
