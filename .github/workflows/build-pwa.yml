name: Build PWA (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '24'
      build-command:
        type: string
        default: 'pnpm run build'
      artifact-name:
        type: string
        default: 'pwa-dist'
      tarball-name:
        type: string
        default: 'xiboplayer-pwa-dist.tar.gz'
      cache-deps:
        type: boolean
        default: true
        description: 'Cache pnpm dependencies (requires lockfile — set false if no lockfile committed)'
      install-command:
        type: string
        default: 'pnpm install --frozen-lockfile'
        description: 'Install command (use --no-frozen-lockfile for repos with workspace overrides)'
      release-name:
        type: string
        default: 'PWA Player'

jobs:
  build:
    name: Build PWA dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-deps && 'pnpm' || '' }}

      - run: ${{ inputs.install-command }}

      - run: ${{ inputs.build-command }}

      - name: Create tarball
        run: tar -czf ${{ inputs.tarball-name }} -C dist .

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.tarball-name }}
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.artifact-name }}

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: "${{ inputs.release-name }} ${{ github.ref_name }}"
          files: ${{ inputs.tarball-name }}
          draft: false
          prerelease: false
