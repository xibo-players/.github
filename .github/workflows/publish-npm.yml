name: Publish to npm (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '22'
      cache-deps:
        type: boolean
        default: true
        description: 'Cache pnpm dependencies (requires lockfile — set false if no lockfile committed)'
      install-command:
        type: string
        default: 'pnpm install --frozen-lockfile'
        description: 'Install command (use --no-frozen-lockfile for repos without lockfile)'
      publish-command:
        type: string
        default: 'pnpm -r publish --no-git-checks --access public'
        description: 'Publish command (--provenance is automatic with trusted publishing)'
      environment:
        type: string
        default: 'npm-publish'
        description: 'GitHub environment configured for npm trusted publishing'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-deps && 'pnpm' || '' }}

      - run: npm install -g npm@latest
        name: Update npm for trusted publishing support

      - run: ${{ inputs.install-command }}

      - run: ${{ inputs.publish-command }}
