name: Publish to npm (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '24'
      cache-deps:
        type: boolean
        default: true
        description: 'Cache pnpm dependencies (requires lockfile — set false if no lockfile committed)'
      install-command:
        type: string
        default: 'pnpm install --frozen-lockfile'
        description: 'Install command (use --no-frozen-lockfile for repos without lockfile)'
      publish-command:
        type: string
        default: 'pnpm -r publish --no-git-checks --access public'
        description: 'Publish command (--provenance is automatic with trusted publishing)'
      environment:
        type: string
        default: 'npm-publish'
        description: 'GitHub environment configured for npm trusted publishing'
      use-gh-packages:
        type: boolean
        default: false
        description: 'Bind @xiboplayer scope to GitHub Packages npm for the INSTALL step (publish still goes to public npm via OIDC). Requires `secrets: inherit` so XIBO_PLAYERS_READ_TOKEN is available. Default false keeps legacy public-npm fetch path.'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-deps && 'pnpm' || '' }}
          # See use-gh-packages input. Affects INSTALL step only.
          registry-url: ${{ inputs.use-gh-packages && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.use-gh-packages && '@xiboplayer' || '' }}

      - env:
          NODE_AUTH_TOKEN: ${{ inputs.use-gh-packages && secrets.XIBO_PLAYERS_READ_TOKEN || '' }}
        run: ${{ inputs.install-command }}

      - run: ${{ inputs.publish-command }}
