name: Build DEB (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
        description: 'DEB package name (e.g. xiboplayer-electron)'
      build-command:
        type: string
        default: ''
        description: 'Build command before DEB (e.g. pnpm run build:linux). Empty = skip.'
      deb-script:
        type: string
        default: 'build-deb.sh'
        description: 'Path to the DEB build script'
      deb-output-dir:
        type: string
        default: 'dist'
        description: 'Directory where DEB files are output'
      node-version:
        type: string
        default: '24'
      default-version:
        type: string
        default: '0.2.0'
      publish-to-repo:
        type: boolean
        default: true
        description: 'Publish DEBs to package repository (default: true for all builds)'
      ubuntu-version:
        type: string
        default: '24.04'
        description: 'Ubuntu version for single-distro builds (use distro-matrix for multi-distro)'
      distro-matrix:
        type: string
        default: ''
        description: 'JSON array of distro:version pairs (e.g. ["ubuntu:24.04", "debian:trixie"]). Overrides ubuntu-version.'
      arch-matrix:
        type: string
        default: '["amd64"]'
        description: 'JSON array of architectures to build (e.g. ["amd64","arm64"])'
      gpg-sign:
        type: boolean
        default: false
        description: 'Enable GPG signing of DEB packages'
      extra-build-deps:
        type: string
        default: ''
        description: 'Extra apt packages to install before build (e.g. cargo cmake libdbus-1-dev)'
    secrets:
      DEB_GPG_KEY:
        required: false
        description: 'ASCII-armored GPG private key for DEB signing'
      DEB_GPG_PASSPHRASE:
        required: false
        description: 'Passphrase for the GPG key'
      PAGES_TOKEN:
        required: false
        description: 'PAT with contents:write on xibo-players.github.io for central repo publishing'
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      R2_ENDPOINT:
        required: false

jobs:
  build:
    name: Build DEB (${{ matrix.distro }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    container:
      image: ${{ matrix.distro }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        distro: ${{ fromJSON(inputs.distro-matrix || format('["ubuntu:{0}"]', inputs.ubuntu-version || '24.04')) }}
        arch: ${{ fromJSON(inputs.arch-matrix) }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute distro tag
        id: distro
        run: |
          # Convert "ubuntu:24.04" → "ubuntu2404", "debian:trixie" → "debiantrixie"
          tag=$(echo "${{ matrix.distro }}" | tr -d ':.')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install deb tools
        run: |
          apt-get update
          apt-get install -y dpkg-dev debhelper build-essential curl git

      - name: Install extra build dependencies
        if: inputs.extra-build-deps != ''
        run: apt-get install -y ${{ inputs.extra-build-deps }}

      - name: Install Node.js for pnpm-action
        if: inputs.build-command != ''
        run: apt-get install -y nodejs npm

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        if: inputs.build-command != ''

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: inputs.build-command != ''
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        if: inputs.build-command != ''
        run: pnpm install --no-frozen-lockfile

      - name: Build application
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Determine version and release
        id: version
        run: |
          # Strict priority — never fall back to a default. Fail loudly if no source.
          # Priority: git tag > RPM spec > package.json
          VERSION=""
          RELEASE=""

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            TAG="${TAG#v}"
            # Support tags like v0.3.1-2 → version=0.3.1, release=2
            if [[ "$TAG" == *-* ]]; then
              VERSION="${TAG%%-*}"
              RELEASE="${TAG#*-}"
            else
              VERSION="$TAG"
              RELEASE="1"
            fi
            echo "Read from git tag: $VERSION-$RELEASE"
          else
            # Try RPM spec — look in common locations for packages that
            # keep their spec at the repo root (xiboplayer-chromium) or
            # in an rpm/ subdirectory (xiboplayer-electron, kiosk, arexibo).
            SPEC=""
            for candidate in rpm/*.spec ./*.spec; do
              if [ -f "$candidate" ]; then
                SPEC="$candidate"
                break
              fi
            done
            if [ -n "$SPEC" ] && [ -f "$SPEC" ]; then
              SPEC_VER=$(grep -oP '^Version:\s*\K\S+' "$SPEC")
              # Skip macros like %{_version}
              if [ -n "$SPEC_VER" ] && [[ "$SPEC_VER" != *"%"* ]]; then
                VERSION="$SPEC_VER"
                RELEASE_RAW=$(grep -oP '^Release:\s*\K\S+' "$SPEC" 2>/dev/null)
                RELEASE=$(echo "$RELEASE_RAW" | sed 's/%.*//')
                [ -z "$RELEASE" ] && RELEASE="1"
                echo "Read from RPM spec ($SPEC): $VERSION-$RELEASE"
              fi
            fi

            # Fallback to package.json (for Node projects without literal RPM spec).
            # Parse with grep/sed — jq is not installed in the DEB build containers
            # and installing it just for version parsing adds an unnecessary dep.
            if [ -z "$VERSION" ] && [ -f "package.json" ]; then
              VERSION=$(grep -oP '"version"\s*:\s*"\K[^"]+' package.json 2>/dev/null | head -1)
              if [ -n "$VERSION" ]; then
                RELEASE="1"
                echo "Read from package.json: $VERSION"
              fi
            fi
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Cannot determine version. Need a git tag, an RPM spec with literal Version:, or a package.json."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Final version: $VERSION-$RELEASE"

      - name: Fetch shared packaging library
        run: |
          curl -fsSL https://raw.githubusercontent.com/xibo-players/.github/main/scripts/packaging/lib-deb.sh \
            -o /tmp/lib-deb.sh
          echo "PKG_LIB_DEB=/tmp/lib-deb.sh" >> "$GITHUB_ENV"

      - name: Build DEB
        run: |
          if [ -f "${{ inputs.deb-script }}" ]; then
            chmod +x ${{ inputs.deb-script }}
            ./${{ inputs.deb-script }} "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.release }}"
          else
            echo "Error: DEB script ${{ inputs.deb-script }} not found"
            exit 1
          fi

          # Verify DEBs were created
          shopt -s nullglob
          deb_files=(${{ inputs.deb-output-dir }}/*.deb)
          if [ ${#deb_files[@]} -eq 0 ]; then
            echo "Error: No DEB files found in ${{ inputs.deb-output-dir }}"
            exit 1
          fi

          echo "Built DEBs:"
          ls -lh ${{ inputs.deb-output-dir }}/*.deb

          # Check for source package files
          shopt -s nullglob
          src_files=(${{ inputs.deb-output-dir }}/*.dsc ${{ inputs.deb-output-dir }}/*.orig.tar.* ${{ inputs.deb-output-dir }}/*.debian.tar.*)
          if [ ${#src_files[@]} -gt 0 ]; then
            echo ""
            echo "Source package files:"
            ls -lh "${src_files[@]}"
          fi

      - name: Tag output files with distro
        run: |
          tag="${{ steps.distro.outputs.tag }}"
          cd "${{ inputs.deb-output-dir }}"
          shopt -s nullglob
          for f in *.deb *.dsc *.orig.tar.* *.debian.tar.*; do
            mv "$f" "${tag}.${f}"
          done

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.package-name }}-deb-${{ steps.distro.outputs.tag }}-${{ matrix.arch }}
          path: |
            ${{ inputs.deb-output-dir }}/*.deb
            ${{ inputs.deb-output-dir }}/*.dsc
            ${{ inputs.deb-output-dir }}/*.orig.tar.*
            ${{ inputs.deb-output-dir }}/*.debian.tar.*
          retention-days: 30

  sign:
    name: Sign DEBs
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all DEB artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ${{ inputs.package-name }}-deb-*
          merge-multiple: true
          path: debs/

      - name: List downloaded DEBs
        run: ls -lh debs/

      - name: Export GPG public key
        if: inputs.gpg-sign
        env:
          GPG_KEY: ${{ secrets.DEB_GPG_KEY }}
        run: |
          # Import GPG key to export public part. Secret stores raw
          # ASCII armor — pipe directly, no base64 layer.
          printf '%s\n' "$GPG_KEY" | gpg --batch --import

          # Export public key for repository consumers
          # (APT repo signing is done in update-repos.yml via Release.gpg/InRelease)
          gpg --armor --export > debs/DEB-GPG-KEY-${{ inputs.package-name }}.asc

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.package-name }}-deb-signed
          path: debs/
          retention-days: 30

  upload:
    name: Upload to R2
    needs: sign
    runs-on: ubuntu-latest

    steps:
      - name: Download signed DEBs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.package-name }}-deb-signed
          path: debs/

      - name: Upload DEBs to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PACKAGE: ${{ inputs.package-name }}
        run: |
          pip install awscli 2>/dev/null || sudo pip install awscli

          BUCKET="${R2_BUCKET}"

          # DEB distro tags and their repo paths
          declare -A DISTRO_PATHS=(
            ["ubuntu2404"]="deb/ubuntu/24.04"
            ["debiantrixie"]="deb/debian/trixie"
          )
          DEFAULT_DISTRO="ubuntu2404"

          for file in debs/*.deb; do
            NAME=$(basename "$file")

            # Parse distro tag from prefix (e.g., ubuntu2404.xiboplayer-electron_0.7.12_amd64.deb)
            distro_tag=""
            clean_name="$NAME"
            for tag in "${!DISTRO_PATHS[@]}"; do
              if [[ "$NAME" == "${tag}."* ]]; then
                distro_tag="$tag"
                clean_name="${NAME#${tag}.}"
                break
              fi
            done
            [ -z "$distro_tag" ] && distro_tag="$DEFAULT_DISTRO" && clean_name="$NAME"

            # Determine arch from filename
            if [[ "$clean_name" == *_amd64.deb ]]; then
              arch="amd64"
            elif [[ "$clean_name" == *_arm64.deb ]]; then
              arch="arm64"
            elif [[ "$clean_name" == *_all.deb ]]; then
              arch="all"
            else
              echo "  SKIP unknown arch: $NAME"
              continue
            fi

            REPO_BASE="${DISTRO_PATHS[$distro_tag]}"
            DEST="$BUCKET/$REPO_BASE/$arch/$clean_name"
            echo "  $clean_name → $REPO_BASE/$arch/"
            aws s3 cp "$file" "$DEST" --endpoint-url "$R2_ENDPOINT"

            # 'all' arch DEBs also go to amd64 and arm64
            if [ "$arch" = "all" ]; then
              for extra in amd64 arm64; do
                aws s3 cp "$file" "$BUCKET/$REPO_BASE/$extra/$clean_name" --endpoint-url "$R2_ENDPOINT"
              done
            fi
          done

  notify:
    name: Trigger repository update
    needs: upload
    if: inputs.publish-to-repo
    runs-on: ubuntu-latest

    steps:
      - name: Trigger update-repos on central pages repo
        env:
          GH_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/xibo-players/xibo-players.github.io/dispatches" \
            -d '{"event_type": "update-repos", "client_payload": {"package": "${{ inputs.package-name }}", "repo": "${{ github.repository }}"}}'
          echo "Triggered update-repos for ${{ inputs.package-name }}"
