name: Create GitHub Release (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
      description:
        type: string
        default: ''
      changelog:
        type: string
        default: ''

jobs:
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PKG: ${{ inputs.package-name }}
        run: |
          VERSION="${TAG#v}"
          CHANGELOG="${{ inputs.changelog }}"
          DESC="${{ inputs.description }}"

          NOTES=$(cat <<NOTES_EOF
          ${DESC}

          ${CHANGELOG:+## Changes

          ${CHANGELOG}
          }
          ## Install

          See [installation instructions](https://www.xiboplayer.org/downloads/) for Fedora, Ubuntu and Debian.

          \`\`\`bash
          # Fedora
          sudo dnf install ${PKG}

          # Ubuntu / Debian
          sudo apt install ${PKG}
          \`\`\`
          NOTES_EOF
          )

          gh release view "$TAG" --json tagName >/dev/null 2>&1 || \
            gh release create "$TAG" --title "${PKG} ${TAG}" --notes ""
          gh release edit "$TAG" --notes "$NOTES"
